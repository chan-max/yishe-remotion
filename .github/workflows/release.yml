name: Build Desktop Installers and Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/release.ts"
      - "server/**"
      - "templates/**"
      - "remotion/**"
      - "ui/**"
      - "public/**"
      - "tsconfig.json"
      - "remotion.config.ts"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${VERSION}"
          RELEASE_NAME="Desktop Installers ${RELEASE_TAG}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Desktop release"
              echo ""
              echo "Manual dispatch requested. Building installers for \`${RELEASE_TAG}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PREVIOUS_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -e "const fs = require('node:fs'); const text = fs.readFileSync(0, 'utf8'); console.log(JSON.parse(text).version);" 2>/dev/null || echo "none")

          if [ "${VERSION}" = "${PREVIOUS_VERSION}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Desktop release skipped"
              echo ""
              echo "package.json version unchanged: \`${VERSION}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Desktop release"
            echo ""
            echo "Version changed: \`${PREVIOUS_VERSION}\` -> \`${VERSION}\`."
            echo "GitHub release tag: \`${RELEASE_TAG}\`."
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: macos-13
            label: macos-x64
          - os: macos-14
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Build desktop installer
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: bun run release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release/dist/artifacts/*
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**/*

      - name: Release summary
        shell: bash
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          {
            echo "## Desktop installers published"
            echo ""
            echo "Tag: \`${{ needs.prepare.outputs.release_tag }}\`"
            echo ""
            echo "Fixed latest download URLs:"
            echo ""
            echo "- Windows x64: ${REPO_URL}/releases/latest/download/yishe-video-tool-windows-x64-setup.exe"
            echo "- macOS Intel: ${REPO_URL}/releases/latest/download/yishe-video-tool-macos-x64.dmg"
            echo "- macOS Apple Silicon: ${REPO_URL}/releases/latest/download/yishe-video-tool-macos-arm64.dmg"
            echo ""
            echo "Each release also uploads matching runtime manifests and SHA256 files."
          } >> "$GITHUB_STEP_SUMMARY"
