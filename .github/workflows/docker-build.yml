name: Build and Push Docker Image

# 说明：
# 1. 需要在 GitHub Repository Settings -> Secrets and variables -> Actions 中配置以下 secrets:
#    - DOCKER_USERNAME: Docker Hub 用户名
#    - DOCKER_PASSWORD: Docker Hub 密码或访问令牌
#    - SERVER_HOST: 服务器地址（可选，不设置则跳过部署）
#    - SERVER_USERNAME: SSH 用户名
#    - SERVER_PASSWORD: SSH 密码（可选）
#    - SERVER_SSH_KEY: SSH 私钥（可选，推荐）
#    - SERVER_DEPLOY_PATH: 服务器部署路径（可选，默认 /workspace/yishe-remotion）
#    - SERVER_PORT: SSH 端口（可选，默认 22）
# 2. 工作流程：
#    - 推送 main 分支且 package.json 变化时触发
#    - 读取 package.json 版本号
#    - 构建并推送 Docker 镜像
#    - 可选：通过 SSH 在服务器拉取最新镜像并启动

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 当前版本: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/yishe-remotion
          tags: |
            type=raw,value=${{ steps.package-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/yishe-remotion:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/yishe-remotion:buildcache,mode=max

      - name: Summary
        run: |
          echo "## 🐳 Docker 镜像构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像名称**: \`${{ secrets.DOCKER_USERNAME }}/yishe-remotion\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本标签**: \`${{ steps.package-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**标签**: \`latest\`, \`${{ steps.package-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 使用方式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 拉取最新版本" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/yishe-remotion:${{ steps.package-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 或拉取 latest 标签" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/yishe-remotion:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 运行容器" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 1572:1572 ${{ secrets.DOCKER_USERNAME }}/yishe-remotion:${{ steps.package-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Check deployment configuration
        id: check-deploy
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "⚠️  SERVER_HOST 未配置，跳过自动部署"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 检测到 SERVER_HOST 配置，将执行自动部署"
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Server
        id: deploy
        if: steps.check-deploy.outputs.skip_deploy == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DEPLOY_PATH,DOCKER_USERNAME
          script: |
            DEPLOY_PATH="${DEPLOY_PATH:-/workspace/yishe-remotion}"
            DOCKER_USERNAME="${DOCKER_USERNAME:-1sdesign}"

            echo "🚀 开始部署到服务器..."
            echo "📂 部署路径: $DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "📁 目录不存在，正在创建: $DEPLOY_PATH"
              mkdir -p $DEPLOY_PATH || { echo "❌ 错误: 无法创建目录 $DEPLOY_PATH"; exit 1; }
            fi

            cd $DEPLOY_PATH || { echo "❌ 错误: 无法进入目录 $DEPLOY_PATH"; exit 1; }

            if [ ! -f "docker-compose.hub.yml" ]; then
              echo "📄 docker-compose.hub.yml 文件不存在，正在自动创建..."
              cat > docker-compose.hub.yml << EOF
            version: '3.8'

            services:
              yishe-remotion:
                image: ${DOCKER_USERNAME}/yishe-remotion:latest
                container_name: yishe-remotion
                ports:
                  - "1572:1572"
                volumes:
                  - ./renders:/app/renders
                environment:
                  - NODE_ENV=production
                  - PORT=1572
                  - REMOTION_SERVE_URL=build
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      cpus: '2'
                      memory: 3G
                    reservations:
                      cpus: '0.5'
                      memory: 512M
            EOF
              echo "✅ docker-compose.hub.yml 文件创建成功（镜像: ${DOCKER_USERNAME}/yishe-remotion:latest）"
            fi

            echo "📁 根据 docker-compose.hub.yml 中的 volumes 配置创建必要的目录..."
            grep -E '^\s+-\s+\./' docker-compose.hub.yml 2>/dev/null | sed -E 's/.*\.\/([^:]+):.*/\1/' | while read -r dir; do
              if [ -n "$dir" ]; then
                mkdir -p "$dir"
                echo "✅ 已创建目录: $dir"
              fi
            done

            echo "📦 拉取最新镜像..."
            docker pull ${DOCKER_USERNAME}/yishe-remotion:latest

            echo "♻️  重启服务..."
            docker compose -f docker-compose.hub.yml up -d

            echo "✅ 部署完成"
