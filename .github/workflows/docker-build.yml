name: Build and Push Docker Image

# 说明：
# 1. 需要在 GitHub Repository Settings -> Secrets and variables -> Actions 中配置以下 secrets:
#    - DOCKER_USERNAME: Docker Hub 用户名
#    - DOCKER_PASSWORD: Docker Hub 密码或访问令牌
#    - SERVER_HOST: 服务器地址（可选，不设置则跳过部署）
#    - SERVER_USERNAME: SSH 用户名
#    - SERVER_PASSWORD: SSH 密码（可选）
#    - SERVER_SSH_KEY: SSH 私钥（可选，推荐）
#    - SERVER_DEPLOY_PATH: 服务器部署路径（可选，默认 /workspace/yishe-remotion）
#    - SERVER_PORT: SSH 端口（可选，默认 22）
# 2. 工作流程：
#    - 推送 main 分支时触发（监听所有源码路径）
#    - 检查 package.json 的 version 是否相比上一次 commit 发生了变化
#    - version 未变则跳过构建，直接结束
#    - version 有变则构建并推送 Docker 镜像，然后部署到服务器

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "ui/**"
      - "server/**"
      - "templates/**"
      - "remotion/**"
      - "Dockerfile"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version-check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          # 获取上一个 commit 的 package.json version
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "none")
          echo "previous=$PREV" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$PREV" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  version 未变化 ($CURRENT)，跳过构建"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🆕 version 变化: $PREV → $CURRENT，开始构建"
          fi

      - name: Skip summary
        if: steps.version-check.outputs.changed == 'false'
        run: |
          echo "## ⏭️ 跳过构建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**原因**: package.json version 未发生变化（当前: \`${{ steps.version-check.outputs.current }}\`）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "如需触发构建，请更新 package.json 中的 version 字段后再 push。" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        if: steps.version-check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version-check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        if: steps.version-check.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/yishe-remotion
          tags: |
            type=raw,value=${{ steps.version-check.outputs.current }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.version-check.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/yishe-remotion:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/yishe-remotion:buildcache,mode=max

      - name: Summary
        if: steps.version-check.outputs.changed == 'true'
        run: |
          echo "## 🐳 Docker 镜像构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像名称**: \`${{ secrets.DOCKER_USERNAME }}/yishe-remotion\`" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: \`${{ steps.version-check.outputs.previous }}\` → \`${{ steps.version-check.outputs.current }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/yishe-remotion:${{ steps.version-check.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/yishe-remotion:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Check deployment configuration
        if: steps.version-check.outputs.changed == 'true'
        id: check-deploy
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "⚠️  SERVER_HOST 未配置，跳过自动部署"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 检测到 SERVER_HOST 配置，将执行自动部署"
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Server
        if: steps.version-check.outputs.changed == 'true' && steps.check-deploy.outputs.skip_deploy == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DEPLOY_PATH,DOCKER_USERNAME
          script: |
            DEPLOY_PATH="${DEPLOY_PATH:-/workspace/yishe-remotion}"
            DOCKER_USERNAME="${DOCKER_USERNAME:-1sdesign}"

            echo "🚀 开始部署到服务器..."
            echo "📂 部署路径: $DEPLOY_PATH"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH || { echo "❌ 无法进入目录 $DEPLOY_PATH"; exit 1; }

            if [ ! -f "docker-compose.hub.yml" ]; then
              echo "📄 docker-compose.hub.yml 不存在，自动创建..."
              cat > docker-compose.hub.yml << EOF
            version: '3.8'
            services:
              yishe-remotion:
                image: ${DOCKER_USERNAME}/yishe-remotion:latest
                container_name: yishe-remotion
                ports:
                  - "1572:1572"
                volumes:
                  - ./renders:/app/renders
                environment:
                  - NODE_ENV=production
                  - PORT=1572
                  - REMOTION_SERVE_URL=build
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      cpus: '2'
                      memory: 3G
                    reservations:
                      cpus: '0.5'
                      memory: 512M
            EOF
              echo "✅ docker-compose.hub.yml 创建成功"
            fi

            mkdir -p renders

            echo "📦 拉取最新镜像..."
            docker pull ${DOCKER_USERNAME}/yishe-remotion:latest

            echo "♻️  重启服务..."
            docker compose -f docker-compose.hub.yml up -d

            echo "✅ 部署完成"
